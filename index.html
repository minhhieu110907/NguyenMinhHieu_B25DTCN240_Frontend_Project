<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIKKEI_EDU_BLOG</title>
    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="../CSS/reponsive.css">
    <link rel="stylesheet" href="../CSS/ui-manager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <img src="../ASSET/icon/logo_header.png" alt="Logo" class="logo-img">
            <span class="logo-text">RIKKEI_EDU_BLOG</span>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for articles">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div class="header-right">
            <div id="headerAuthButtons">
                <a href="../PAGE/register.html"><button id="btnSignUp" class="btn-outline">Sign Up</button></a>
                <a href="../PAGE/login.html"><button id="btnSignIn" class="btn-outline">Sign In</button></a>
            </div>

            <div id="headerUserDropdown" class="user-profile" style="display: none;">
                <img id="headerUserAvatar" src="" alt="User Avatar">
                <div class="dropdown">
                    <div class="dropdown-content">
                        <div class="user-info">
                            <strong id="headerUserName">User</strong><br>
                            <small id="headerUserEmail">user@gmail.com</small>
                        </div>
                        <a href="#" data-menu-action="view-profile">View profile</a>
                        <a href="#" data-menu-action="update-avatar">Update profile picture</a>
                        <a href="#" data-menu-action="change-password">Change password</a>
                        <a href="#" data-menu-action="logout" class="logout">Log out</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <section class="section recent-section">
            <h2 class="section-title">Recent blog posts</h2>
            <div class="recent-grid" id="recentPostsContainer">
                </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>All blog posts</h2>
                <div class="categories" id="categoryContainer">
                    <a href="./PAGE/allmypost.html" class="active" data-category="All">All my posts</a>
                    <a href="#" data-category="Daily Journal">Daily Journal</a>
                    <a href="#" data-category="Work & Career">Work & Career</a>
                    <a href="#" data-category="Personal Thoughts">Personal Thoughts</a>
                    <a href="#" data-category="Emotions & Feelings">Emotions & Feelings</a>
                </div>
            </div>

            <div class="posts-grid" id="allPostsContainer">
                </div>

            <div class="pagination">
                <a href="#" class="prev">← Previous</a>
                <div class="page-numbers">
                    <span class="active">1</span>
                    <span>2</span>
                    <span>3</span>
                </div>
                <a href="#" class="next">Next →</a>
            </div>
        </section>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand"><h1>MY BLOG</h1></div>
            <div class="footer-columns">
                 </div>
        </div>
    </footer>

    <script type="module" src="../JS/index.js"></script>
</body>
</html>
