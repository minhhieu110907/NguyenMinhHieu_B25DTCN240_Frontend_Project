<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Rikkeisoft</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <img src="../ASSET/images/Hai cầu tím trên nền xanh.png" class="bg-image" alt="background">

    <div class="container">
        <div class="left-content">
            <h1>Welcome to the website</h1>
            <p>RIKKEI EDUCATION</p>
        </div>

        <div class="form-box">
            <div class="name-row">
                <div>
                    <input type="text">
                    <label>First name</label>
                </div>
                <div>
                    <input type="text">
                    <label>Last name</label>
                </div>
            </div>

            <div class="input-group">
                <input type="email">
                <label>Email address</label>
            </div>

            <div class="input-group">
                <input type="password">
                <label>Password</label>
            </div>

            <div class="input-group">
                <input type="password">
                <label>Confirm Password</label>
            </div>

            <button type="submit">Sign up</button>

            <p class="login-text">
                Already have an account? <a href="../PAGE/login.html">Login</a>
            </p>
        </div>
    </div>

</body>
</html>
