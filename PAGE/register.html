<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Rikkeisoft</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../CSS/ui-manager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <img src="../ASSET/images/Hai cầu tím trên nền xanh.png" class="bg-image" alt="background">

    <div class="container">
        <div class="left-content">
            <h1>Welcome to the website</h1>
            <p>RIKKEI EDUCATION</p>
        </div>

        <form class="form-box" style="position: relative;">
            <div class="name-row">
                <div>
                    <input type="text" id="first-name">
                    <label>First name</label>
                </div>
                <div>
                    <input type="text" id="last-name">
                    <label>Last name</label>
                </div>
            </div>

            <div class="input-group">
                <input type="email" id="email">
                <label>Email address</label>
            </div>

            <div class="input-group" style="position: relative;">
                <input type="password" id="password" placeholder="Nhập mật khẩu"
                    style="width: 100%; padding-right: 35px; height: 35px;">

                <i class="toggleIcon fa-regular fa-eye"
                        style=" position: absolute; right: 12px; top: 28%; transform: translateY(-50%); cursor:
                    pointer;"></i>
                <label for="password">Password</label>
            </div>

            <div class="input-group" style="position: relative;">
                <input type="password" id="rePassword" placeholder="Nhập lại mật khẩu"
                    style="width: 100%; padding-right: 35px; height: 35px;">

                <i class="toggleIcon fa-regular fa-eye"
                        style=" position: absolute; right: 12px; top: 28%; transform: translateY(-50%); cursor:
                    pointer;"></i>
                <label for="password">Confirm password</label>
            </div>

            <button type="submit">Sign up</button>

            <p class="login-text">
                Already have an account? <a href="../PAGE/login.html">Login</a>
            </p>
        </form>
    </div>

    <script type="module" src="../JS/register.js"></script>
</body>

</html>
