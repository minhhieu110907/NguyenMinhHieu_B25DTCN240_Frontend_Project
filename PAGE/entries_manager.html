<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entries Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/menu.css">
    <link rel="stylesheet" href="../CSS/admin_topbar.css">
    <link rel="stylesheet" href="../CSS/entries_manager.css">
    <link rel="stylesheet" href="../CSS/admin_pagination.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>
    <div class="admin-page" id="entriesManagerPage">
        <header class="admin-topbar">
            <div class="admin-topbar__right">
                <button class="admin-topbar__icon-btn" id="entriesMessageButton" type="button" aria-label="Tin nhắn">
                    <i class="fa-regular fa-envelope"></i>
                    <span class="admin-topbar__badge" aria-hidden="true">2</span>
                </button>
                <button class="admin-topbar__icon-btn" id="entriesAlertButton" type="button" aria-label="Thông báo">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <div class="user-profile" id="adminUserProfile">
                    <img src="https://i.pravatar.cc/44?img=12" alt="User Avatar">
                    <div class="dropdown">
                        <div class="dropdown-content">
                            <div class="user-info">
                                <strong>Rikkei</strong><br>
                                <small>rikkei@gmail.com</small>
                            </div>
                            <a href="#">View profile</a>
                            <a href="#">Update profile picture</a>
                            <a href="#">Change password</a>
                            <a href="#" class="logout">Log out</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="admin-layout">
            <aside class="admin-menu" id="adminMenu">
                <nav class="admin-menu__nav">
                    <a class="admin-menu__item" id="menuUsersLink" href="./user_manager.html"><span class="admin-menu__icon"><i class="fa-solid fa-users"></i></span><span class="admin-menu__label">Manage Users</span></a>
                    <a class="admin-menu__item admin-menu__item--active" id="menuEntriesLink" href="./entries_manager.html"><span class="admin-menu__icon"><i class="fa-regular fa-rectangle-list"></i></span><span class="admin-menu__label">Manage Entries</span></a>
                    <a class="admin-menu__item" id="menuArticlesLink" href="./article_manager.html"><span class="admin-menu__icon"><i class="fa-regular fa-newspaper"></i></span><span class="admin-menu__label">Manage Article</span></a>
                    <a class="admin-menu__item admin-menu__item--logout" id="menuLogoutLink" href="./login.html"><span class="admin-menu__icon"><i class="fa-solid fa-right-from-bracket"></i></span><span class="admin-menu__label">Log out</span></a>
                </nav>
            </aside>

            <main class="admin-main">
                <section class="entries-panel" id="entriesPanel">
                    <label class="entries-panel-search" for="entriesCategorySearchInput">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="entriesCategorySearchInput" type="text" placeholder="Search Article Categories">
                    </label>
                    <h1 class="entries-panel__title"><i class="fa-regular fa-folder-open"></i> Manage Categories</h1>

                    <div class="entries-form" id="entriesFormSection">
                        <label for="categoryNameInput">Category Name:</label>
                        <input id="categoryNameInput" type="text" placeholder="Enter category name">
                        <button class="entries-form__submit" id="addCategoryButton" type="button">Add Category</button>
                    </div>

                    <div class="entries-table-wrapper">
                        <h2 class="entries-table__title"><i class="fa-regular fa-rectangle-list"></i> Category List</h2>
                        <table class="entries-table" id="entriesTable">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Category Name</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoryTableBody">
                                <tr>
                                    <td>1</td>
                                    <td>Personal Thoughts</td>
                                    <td>
                                        <button class="entries-action entries-action--edit" id="editCategoryBtn1" type="button">Edit</button>
                                        <button class="entries-action entries-action--delete" id="deleteCategoryBtn1" type="button">Delete</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="admin-pagination" id="entriesPagination">
                        <button class="admin-pagination__button" id="entriesPaginationPrevious" type="button"><i class="fa-solid fa-arrow-left"></i><span>Previous</span></button>
                        <div class="admin-pagination__numbers">
                            <button class="admin-pagination__number admin-pagination__number--active" id="entriesPage1" type="button">1</button>
                            <button class="admin-pagination__number" id="entriesPage2" type="button">2</button>
                            <button class="admin-pagination__number" id="entriesPage3" type="button">3</button>
                            <span class="admin-pagination__dots">...</span>
                            <button class="admin-pagination__number" id="entriesPage10" type="button">10</button>
                        </div>
                        <button class="admin-pagination__button" id="entriesPaginationNext" type="button"><span>Next</span><i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
