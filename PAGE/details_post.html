<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
    <link rel="stylesheet" href="../CSS/details_post.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">
        <div class="back-btn" id="backBtn">
            <i class="fa-solid fa-chevron-left"></i>
        </div>

        <div class="main-post">
            <div id="postHeaderContainer"></div>

            <div class="add-comment-section">
                <img src="" id="currentUserAvatar" alt="Avatar">
                <div class="input-wrapper">
                    <input type="text" id="commentInput" placeholder="Viết bình luận của bạn...">
                    <button id="sendCommentBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div class="view-comments" id="toggleComments">
                <span>View all comments</span> <i class="fa-solid fa-chevron-down"></i>
            </div>

            <div id="commentsList" style="display: none;"></div>
        </div>
    </div>

    <script type="module" src="../JS/details_post.js"></script>
</body>

</html>
