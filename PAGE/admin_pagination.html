<div class="admin-pagination" id="adminPagination">
    <button class="admin-pagination__button" id="paginationPreviousBtn" type="button">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Previous</span>
    </button>

    <div class="admin-pagination__numbers" id="paginationNumbers">
        <button class="admin-pagination__number admin-pagination__number--active" id="paginationPage1" type="button">1</button>
        <button class="admin-pagination__number" id="paginationPage2" type="button">2</button>
        <button class="admin-pagination__number" id="paginationPage3" type="button">3</button>
        <span class="admin-pagination__dots">...</span>
        <button class="admin-pagination__number" id="paginationPage10" type="button">10</button>
    </div>

    <button class="admin-pagination__button" id="paginationNextBtn" type="button">
        <span>Next</span>
        <i class="fa-solid fa-arrow-right"></i>
    </button>
</div>
