<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/admin_global.css">
    <link rel="stylesheet" href="../CSS/user_manager.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>

<body>
    <div class="admin-container">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="topbar">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search user">
                </div>
                <div class="top-right">
                    <i class="fa-solid fa-envelope"></i>
                    <i class="fa-solid fa-bell"></i>
                    <img src="https://i.pravatar.cc/40" alt="Avatar" class="avatar">
                </div>
            </header>

            <div class="content-header">
                <h1>Team members <span class="badge">100 users</span></h1>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-search-user" placeholder="Search user">
                </div>
            </div>

            <section class="table-section">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name <i class="fa-solid fa-arrow-down"></i></th>
                            <th>Status <i class="fa-solid fa-arrow-down"></i></th>
                            <th>Email address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list">
                    </tbody>
                </table>
            </section>

            <div class="pagination" id="user-pagination">
                <button class="page-btn"><i class="fa-solid fa-arrow-left"></i> Previous</button>
                <div class="page-numbers">
                    <button class="page-number active">1</button>
                    <button class="page-number">2</button>
                    <span class="dots">...</span>
                    <button class="page-number">10</button>
                </div>
                <button class="page-btn">Next <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </main>
    </div>

    <script src="../JS/storage.js"></script>
    <script src="../JS/user_manager.js"></script>
    <script>
        // Gọi hàm load menu khi trang web tải xong
        // loadMenu('id_của_item_muốn_active')
        // Lưu ý: Phải chạy qua Live Server (VS Code) thì fetch mới hoạt động
        window.onload = () => loadMenu('menu-user'); 
    </script>
</body>

</html>
