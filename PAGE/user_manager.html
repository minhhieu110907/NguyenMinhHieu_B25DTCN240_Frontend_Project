<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/menu.css">
    <link rel="stylesheet" href="../CSS/user_manager.css">
    <link rel="stylesheet" href="../CSS/admin_pagination.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>
    <div class="admin-page" id="userManagerPage">
        <header class="admin-topbar">
            <div class="admin-topbar__right">
                <button class="admin-topbar__icon-btn" id="notificationButton" type="button">
                    <i class="fa-regular fa-envelope"></i>
                </button>
                <button class="admin-topbar__icon-btn" id="alertButton" type="button">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <img class="admin-topbar__avatar" src="https://i.pravatar.cc/36?img=12" alt="Admin avatar">
            </div>
        </header>

        <div class="admin-layout">
            <aside class="admin-menu" id="adminMenu">
                <div class="admin-menu__brand">admin_customer</div>
                <nav class="admin-menu__nav">
                    <a class="admin-menu__item admin-menu__item--active" id="menuUsersLink" href="./user_manager.html">
                        <span class="admin-menu__icon"><i class="fa-solid fa-users"></i></span>
                        <span class="admin-menu__label">Manage Users</span>
                    </a>
                    <a class="admin-menu__item" id="menuEntriesLink" href="./entries_manager.html">
                        <span class="admin-menu__icon"><i class="fa-regular fa-rectangle-list"></i></span>
                        <span class="admin-menu__label">Manage Entries</span>
                    </a>
                    <a class="admin-menu__item" id="menuArticlesLink" href="./article_manager.html">
                        <span class="admin-menu__icon"><i class="fa-regular fa-newspaper"></i></span>
                        <span class="admin-menu__label">Manage Article</span>
                    </a>
                    <a class="admin-menu__item admin-menu__item--logout" id="menuLogoutLink" href="./login.html">
                        <span class="admin-menu__icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="admin-menu__label">Log out</span>
                    </a>
                </nav>
            </aside>

            <main class="admin-main">
                <section class="admin-panel" id="userManagerSection">
                    <div class="user-manager__header">
                        <h1 class="user-manager__title">Team members <span class="user-manager__badge" id="userCountBadge">100 users</span></h1>
                        <label class="user-manager__search" for="userSearchInput">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input id="userSearchInput" type="text" placeholder="Search user">
                        </label>
                    </div>

                    <div class="user-table-wrapper">
                        <table class="user-table" id="userManagerTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Status</th>
                                    <th>Email address</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <tr>
                                    <td>
                                        <div class="user-cell">
                                            <img class="user-cell__avatar" src="https://i.pravatar.cc/40?img=32" alt="Olivia avatar">
                                            <div>
                                                <p class="user-cell__name">Olivia Rhye</p>
                                                <p class="user-cell__username">@olivia</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span class="user-status" id="userStatus1">hoạt động</span></td>
                                    <td>olivia@untitledui.com</td>
                                    <td>
                                        <button class="user-action user-action--block" id="blockUserBtn1" type="button">block</button>
                                        <button class="user-action user-action--unblock" id="unblockUserBtn1" type="button">unblock</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="user-cell">
                                            <img class="user-cell__avatar" src="https://i.pravatar.cc/40?img=14" alt="Phoenix avatar">
                                            <div>
                                                <p class="user-cell__name">Phoenix Baker</p>
                                                <p class="user-cell__username">@phoenix</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span class="user-status">hoạt động</span></td>
                                    <td>phoenix@untitledui.com</td>
                                    <td><button class="user-action user-action--block" type="button">block</button> <button class="user-action user-action--unblock" type="button">unblock</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="admin-pagination" id="userPagination">
                        <button class="admin-pagination__button" id="userPaginationPrevious" type="button"><i class="fa-solid fa-arrow-left"></i><span>Previous</span></button>
                        <div class="admin-pagination__numbers">
                            <button class="admin-pagination__number admin-pagination__number--active" id="userPage1" type="button">1</button>
                            <button class="admin-pagination__number" id="userPage2" type="button">2</button>
                            <button class="admin-pagination__number" id="userPage3" type="button">3</button>
                            <span class="admin-pagination__dots">...</span>
                            <button class="admin-pagination__number" id="userPage10" type="button">10</button>
                        </div>
                        <button class="admin-pagination__button" id="userPaginationNext" type="button"><span>Next</span><i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
